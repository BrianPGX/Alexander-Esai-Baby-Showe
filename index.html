<head>

<title>Baby Shower de Alexander Esaí</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    background: linear-gradient(160deg, #eaf2f7 0%, #f7efe3 100%);
    font-family: 'Georgia', serif;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    min-height: 100vh;
  }

  .invitation {
    position: relative;
    width: 100%;
    max-width: 576px;
    aspect-ratio: 576 / 1024;
    box-shadow:
      0 30px 60px -20px rgba(80, 65, 40, 0.35),
      0 10px 25px -10px rgba(80, 65, 40, 0.25);
    border-radius: 14px;
    overflow: hidden;
    background: #f7efe3;
  }

  .invitation img {
    width: 100%;
    height: 100%;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
    pointer-events: none;
  }

  /* Invisible click targets positioned over the printed buttons */
  .hotspot {
    position: absolute;
    height: 4.2%;
    border: none;
    background: transparent;
    border-radius: 999px;
    cursor: pointer;
    text-indent: -9999px;
    overflow: hidden;
    transition: background-color 0.18s ease, transform 0.18s ease;
    -webkit-tap-highlight-color: rgba(0,0,0,0);
  }

  .hotspot:hover,
  .hotspot:focus-visible {
    background-color: rgba(120, 165, 195, 0.28);
    outline: none;
    transform: scale(1.02);
  }

  .hotspot:active {
    background-color: rgba(120, 165, 195, 0.45);
    transform: scale(0.98);
  }

  .hotspot--maps {
    left: 10.0%;
    top: 86.9%;
    width: 36.8%;
  }

  .hotspot--rsvp {
    left: 54.0%;
    top: 86.9%;
    width: 36.8%;
  }

  /* Tiny credit / hint at bottom (only when wider screens) */
  .hint {
    position: absolute;
    bottom: -28px;
    left: 0;
    right: 0;
    text-align: center;
    color: #8a7a5e;
    font-size: 12px;
    font-style: italic;
    letter-spacing: 0.3px;
    opacity: 0.75;
  }

  @media (max-width: 480px) {
    body { padding: 8px; }
    .hint { display: none; }
  }
</style>
</head>
